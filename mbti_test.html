<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI 성격 유형 테스트 · IC.DEV</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: rgba(255,255,255,0.08);
    --accent: #c8f560;
    --accent2: #7c6dfa;
    --text: #f0f0f0;
    --muted: #999;
    --card: #13131c;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    cursor: none;
    overflow-x: hidden;
  }
  .cursor {
    position: fixed; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    pointer-events: none; z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.1s;
  }
  .cursor-ring {
    position: fixed; width: 36px; height: 36px;
    border: 1px solid rgba(200,245,96,0.4); border-radius: 50%;
    pointer-events: none; z-index: 9998;
    transform: translate(-50%,-50%);
    transition: all 0.15s ease;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.5rem 4rem;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'DM Mono', monospace;
    font-size: 14px; color: var(--accent); letter-spacing: 0.1em;
    text-decoration: none;
  }
  .nav-back {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--muted); text-decoration: none; letter-spacing: 0.05em;
    display: flex; align-items: center; gap: 6px;
    transition: color 0.2s;
  }
  .nav-back:hover { color: var(--text); }
  main {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 8rem 1.5rem 4rem;
  }
  .container { width: 100%; max-width: 560px; }
  .test-header { text-align: center; margin-bottom: 3rem; }
  .test-tag {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 0.2em;
    margin-bottom: 1rem;
    padding: 5px 12px; border: 1px solid rgba(200,245,96,0.25);
    border-radius: 100px;
  }
  .test-title {
    font-size: clamp(2.5rem, 7vw, 5rem);
    line-height: 1.05; margin-bottom: 0.75rem;
    letter-spacing: -0.02em;
  }
  .test-title-main {
    font-family: 'Pretendard', sans-serif;
    font-weight: 700;
  }
  .test-title-em {
    font-family: 'DM Serif Display', serif;
    font-style: italic;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.45);
  }
  .test-subtitle { font-size: 14px; color: var(--muted); line-height: 1.7; }
  .progress-wrap { margin-bottom: 2.5rem; }
  .progress-meta {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.1em;
  }
  .progress-count {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--accent); letter-spacing: 0.05em;
  }
  .progress-bar { height: 2px; background: var(--border); border-radius: 1px; }
  .progress-fill {
    height: 2px; border-radius: 1px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.4s ease;
  }
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.35s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-dim {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--accent2); letter-spacing: 0.15em;
    margin-bottom: 0.75rem;
  }
  .q-text { font-size: 17px; font-weight: 500; line-height: 1.6; margin-bottom: 1.5rem; }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 18px;
    text-align: left; cursor: none;
    font-size: 14px; font-family: 'Pretendard', sans-serif;
    font-weight: 300; color: rgba(240,240,240,0.8);
    line-height: 1.5;
    transition: all 0.2s;
    position: relative; overflow: hidden;
  }
  .opt-btn::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, var(--accent2), var(--accent));
    transform: scaleY(0);
    transition: transform 0.2s;
    border-radius: 0 2px 2px 0;
  }
  .opt-btn:hover {
    border-color: rgba(255,255,255,0.18);
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }
  .opt-btn.selected {
    border-color: rgba(124,109,250,0.5);
    color: var(--text);
    background: rgba(124,109,250,0.08);
  }
  .opt-btn.selected::before { transform: scaleY(1); }
  .nav-btns { display: flex; gap: 10px; margin-top: 1rem; }
  .btn-prev {
    padding: 12px 20px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; cursor: none;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--muted); letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-prev:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .btn-next {
    flex: 1;
    padding: 12px 20px;
    border: none; border-radius: 6px;
    background: var(--accent); cursor: none;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: #0a0a0f; font-weight: 500; letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .btn-next:hover { background: #d4f87a; transform: translateY(-1px); }
  .btn-next:disabled {
    background: rgba(200,245,96,0.2);
    color: rgba(10,10,15,0.4);
    cursor: not-allowed; transform: none;
  }
  .result-wrap { animation: fadeUp 0.5s ease; }
  .result-hero {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem 2rem;
    margin-bottom: 1rem;
    text-align: center;
    position: relative; overflow: hidden;
  }
  .result-hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(124,109,250,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .result-type {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(3.5rem, 12vw, 5.5rem);
    color: var(--accent);
    line-height: 1; margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }
  .result-name {
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--accent2); letter-spacing: 0.15em;
    margin-bottom: 1.5rem;
  }
  .result-desc { font-size: 14px; color: var(--muted); line-height: 1.8; max-width: 420px; margin: 0 auto; }
  .result-traits {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem 2rem;
    margin-bottom: 1rem;
  }
  .section-label {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--accent); letter-spacing: 0.2em;
    margin-bottom: 1.25rem;
  }
  .trait-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .trait-row:last-child { margin-bottom: 0; }
  .trait-label {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.05em;
    width: 72px; flex-shrink: 0;
  }
  .trait-bar-wrap { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .trait-bar { height: 4px; border-radius: 2px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1); width: 0; }
  .trait-pct { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); width: 34px; text-align: right; flex-shrink: 0; }
  .result-strengths {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.75rem 2rem;
    margin-bottom: 1rem;
  }
  .strengths-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 0; }
  .strength-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .strength-item:hover { border-color: rgba(124,109,250,0.3); color: var(--text); }
  .btn-restart {
    width: 100%;
    padding: 14px;
    border: 1px solid var(--border); border-radius: 6px;
    background: transparent; cursor: none;
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--muted); letter-spacing: 0.08em;
    transition: all 0.2s;
    margin-top: 0.5rem;
  }
  .btn-restart:hover { border-color: rgba(200,245,96,0.3); color: var(--accent); background: rgba(200,245,96,0.04); }
  @media (max-width: 600px) {
    nav { padding: 1rem 1.25rem; }
    main { padding: 7rem 1rem 3rem; }
    .q-card, .result-hero, .result-traits, .result-strengths { padding: 1.5rem 1.25rem; }
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>

<nav>
  <a href="index.html" class="nav-logo">IC.DEV</a>
  <a href="index.html" class="nav-back">← 포트폴리오</a>
</nav>

<main>
  <div class="container">
    <div class="test-header" id="header">
      <div class="test-tag">// MBTI TEST</div>
      <h1 class="test-title"><span class="test-title-main">나는 어떤 사람일까?</span></h1>
      <p class="test-subtitle">20개의 질문으로 알아보는 MBTI 성격 유형 분석</p>
    </div>
    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-meta">
        <span class="progress-label">PROGRESS</span>
        <span class="progress-count" id="progress-count">0 / 20</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="app"></div>
  </div>
</main>

<script>
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
  setTimeout(() => {
    ring.style.left = e.clientX + 'px';
    ring.style.top  = e.clientY + 'px';
  }, 80);
});

const dimLabel = { EI:'E / I', SN:'S / N', TF:'T / F', JP:'J / P' };

const questions = [
  { dim:'EI', text:'파티나 모임에서 나는...', a:'다양한 사람들과 어울리며 에너지를 얻는다', b:'소수의 친한 사람들과 대화하거나 혼자 쉬고 싶다' },
  { dim:'SN', text:'새로운 아이디어를 접할 때 나는...', a:'구체적인 사실과 세부 사항에 먼저 집중한다', b:'큰 그림과 가능성을 더 중요하게 본다' },
  { dim:'TF', text:'결정을 내릴 때 나는...', a:'논리적인 분석을 중심으로 결정한다', b:'주변 사람들의 감정과 가치를 고려한다' },
  { dim:'JP', text:'일상에서 나는...', a:'계획된 일정을 따르고 정해진 구조를 선호한다', b:'상황에 맞게 유연하게 대처하는 게 편하다' },
  { dim:'JP', text:'여름 방학이나 휴가를 맞을 때 나는...', a:'미리 계획을 세우고 준비하는 편이다', b:'즉흥적으로 결정하고 자유롭게 즐기는 게 좋다' },
  { dim:'EI', text:'혼자 있는 시간이 생기면 나는...', a:'밖에 나가거나 친구를 불러서 함께한다', b:'혼자만의 시간을 충전의 기회로 삼는다' },
  { dim:'SN', text:'문제를 해결할 때 주로...', a:'검증된 방법과 경험을 활용한다', b:'새로운 접근법을 찾아 시도해본다' },
  { dim:'TF', text:'친구가 의견이 다를 때 나는...', a:'논리적으로 내 의견을 설명하고 설득한다', b:'감정을 배려하며 타협하려 노력한다' },
  { dim:'JP', text:'프로젝트를 시작할 때 나는...', a:'전체 계획을 세운 뒤 단계적으로 진행한다', b:'일단 시작하고 진행하면서 조정한다' },
  { dim:'EI', text:'친구들과 모임에서 나는...', a:'자연스럽게 대화를 먼저 시작하는 편이다', b:'주로 듣는 역할을 하거나 말을 아끼는 편이다' },
  { dim:'SN', text:'이야기를 들을 때 나는...', a:'구체적인 사실과 사례에 집중한다', b:'숨겨진 의미나 전체적인 맥락을 파악한다' },
  { dim:'TF', text:'친구가 힘들다고 말할 때 나는...', a:'해결책을 찾아주려 먼저 노력한다', b:'공감하고 감정을 받아주며 위로한다' },
  { dim:'JP', text:'마감이 다가오면 나는...', a:'미리미리 준비해두는 편이다', b:'마감 직전이 되어야 집중이 잘 된다' },
  { dim:'EI', text:'새로운 환경에 처음 적응할 때...', a:'빠르게 사람들과 어울려서 자연스럽게 스며든다', b:'처음에는 관찰하고 천천히 적응하는 편이다' },
  { dim:'SN', text:'여행을 계획할 때 나는...', a:'현실적인 일정을 꼼꼼히 미리 짜두는 편이다', b:'유동적이고 즉흥적인 여행을 선호한다' },
  { dim:'TF', text:'팀 내 갈등이 생길 때 나는...', a:'팀의 성과와 효율성을 기준으로 판단한다', b:'팀원들의 감정을 중요하게 고려한다' },
  { dim:'EI', text:'스트레스를 받는 상황에서 나는...', a:'사람들과 어울리거나 활동적인 일을 한다', b:'혼자만의 시간을 갖고 재충전한다' },
  { dim:'JP', text:'할 일이 많을 때 나는...', a:'목록을 작성하고 하나씩 체크해나간다', b:'그때그때 생각나는 것을 자연스럽게 처리한다' },
  { dim:'SN', text:'영화나 책을 고를 때 나는...', a:'현실적이고 구체적인 이야기를 선호한다', b:'창의적이고 상상력을 자극하는 이야기를 좋아한다' },
  { dim:'TF', text:'중요한 결정을 내릴 때 나는...', a:'데이터와 논리로 결론을 도출한다', b:'가슴이 이끄는 방향을 중요하게 여긴다' },
];

const mbtiInfo = {
  INTJ:{ name:'전략가',         desc:'독립적이고 분석적인 사고로 미래를 설계하는 유형. 목표를 향해 체계적으로 움직이며, 높은 기준을 스스로에게 적용합니다. 드물지만 강렬한 통찰력을 지닙니다.',                         strengths:['전략적 사고','독립심','목표 지향','분석력','의지력','자기 확신'] },
  INTP:{ name:'논리술사',       desc:'진리에 대한 탐구를 즐기는 조용한 사색가. 복잡한 개념을 분석하고 이론을 구축하는 걸 즐기며, 창의적인 해결책을 찾아냅니다.',                                                   strengths:['논리적 사고','창의성','객관성','이론 탐구','분석력','집중력'] },
  ENTJ:{ name:'통솔자',         desc:'타고난 리더십으로 앞을 이끄는 유형. 명확한 비전을 갖고 효율적으로 이끌며, 목표 달성을 위해 체계적으로 계획하고 실행합니다.',                                                 strengths:['리더십','자신감','의사 결정','효율성','의지력','카리스마'] },
  ENTP:{ name:'변론가',         desc:'도전하기를 즐기는 끊임없는 혁신가. 새로운 아이디어에 열정적이고 새로운 가능성을 탐색하며, 창의적인 문제 해결 능력이 뛰어납니다.',                                             strengths:['창의성','토론 능력','아이디어 생성','적응력','유연성','추진력'] },
  INFJ:{ name:'옹호자',         desc:'깊은 통찰력과 공감 능력을 가진 이상주의자. 타인의 감정을 이해하는 데 큰 재능이 있고 의미 있는 관계와 높은 가치를 품고 있습니다.',                                             strengths:['통찰력','공감 능력','창의성','헌신','의지력','배려'] },
  INFP:{ name:'중재자',         desc:'가치와 이상을 중시하는 조용한 몽상가. 깊이 있는 내면을 지니며, 타인의 감정을 잘 이해하고 창의적인 방식으로 자신을 표현합니다.',                                               strengths:['공감 능력','창의성','적응성','이상주의','헌신','개방성'] },
  ENFJ:{ name:'선도자',         desc:'카리스마 있는 영감을 주는 리더. 구성원들의 잠재력을 개발하고 이끌어내는 데 탁월하며, 공동체의 성장과 발전을 위해 헌신합니다.',                                                 strengths:['소통력','공감 능력','리더십','헌신력','열정','신뢰성'] },
  ENFP:{ name:'활동가',         desc:'열정적이고 창의적인 자유로운 영혼. 새로운 아이디어와 가능성을 탐색하며, 사람들과 깊은 관계를 맺고 세상을 더 나은 방향으로 바꾸고 싶어합니다.',                                 strengths:['창의성','열정','공감력','소통력','개방성','추진력'] },
  ISTJ:{ name:'청렴결백한 논리주의자', desc:'성실하고 신뢰할 수 있는 완벽주의자. 전통과 질서를 중시하며, 맡은 바를 성실히 완수하는 책임감과 신뢰성이 돋보입니다.',                                                   strengths:['책임감','성실함','분석력','인내력','신뢰성','체계성'] },
  ISFJ:{ name:'수호자',         desc:'헌신적이고 따뜻한 보호자. 타인의 필요를 살피는 데 큰 재능이 있으며, 조화로운 환경에서 가족과 친구를 위한 든든한 버팀목이 됩니다.',                                             strengths:['배려심','신뢰성','인내력','세심함','충실함','헌신'] },
  ESTJ:{ name:'엄격한 관리자',  desc:'전통과 규칙을 중시하는 지도자. 명확한 목표와 체계를 갖추고 조직을 이끌며, 목표를 효과적으로 달성하는 데 탁월합니다.',                                                         strengths:['리더십','성실함','의지력','신뢰성','실용성','헌신'] },
  ESFJ:{ name:'집정관',         desc:'사교적이고 화합을 추구하는 유형. 주변 사람들의 필요를 살피고 채워주며, 사람들이 행복하고 발전되도록 노력합니다.',                                                               strengths:['배려심','소통력','충실함','신뢰성','실용성','리더십'] },
  ISTP:{ name:'만능재주꾼',     desc:'대담하고 실용적인 인물. 어떤 사물이 작동하는지를 이해하고 싶어하며, 침착하게 최선의 해결책을 찾아냅니다.',                                                                       strengths:['분석력','실용성','침착함','관찰력','적응력','독립심'] },
  ISFP:{ name:'모험가',         desc:'유연하고 매력적인 예술 탐험가. 새로운 경험과 기회를 탐색하며, 자신만의 방식으로 아름다움과 의미를 표현합니다.',                                                                 strengths:['창의성','공감 능력','개방성','적응력','호기심','예술성'] },
  ESTP:{ name:'사업가',         desc:'활발한 통찰력과 행동 지향적인 실용주의자. 지금 이 순간에 집중하며, 논리적으로 문제를 빠르게 해결하는 걸 즐깁니다.',                                                             strengths:['행동력','관찰력','위기대처','사교성','적응력','추진력'] },
  ESFP:{ name:'연예인',         desc:'자발적이고 활기찬 엔터테이너. 삶을 파티처럼 즐기며, 주변 사람들에게 영감과 즐거움을 선사합니다. 지금 이 순간이 최고임을 믿습니다.',                                             strengths:['사교성','열정','적응력','관찰력','협동력','위기대처'] },
};

const traitColors = {
  EI: 'linear-gradient(90deg, #7c6dfa, #c8f560)',
  SN: 'linear-gradient(90deg, #7c6dfa, #1D9E75)',
  TF: 'linear-gradient(90deg, #7c6dfa, #D85A30)',
  JP: 'linear-gradient(90deg, #7c6dfa, #BA7517)',
};

let current = 0;
let answers = {};

function updateProgress() {
  const pct = Math.round((current / questions.length) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = current + ' / ' + questions.length;
}

function getScores() {
  let E=0,I=0,S=0,N=0,T=0,F=0,J=0,P=0;
  questions.forEach((q,i) => {
    const ans = answers[i];
    if(ans===undefined) return;
    if(q.dim==='EI'){ ans==='a'?E++:I++; }
    else if(q.dim==='SN'){ ans==='a'?S++:N++; }
    else if(q.dim==='TF'){ ans==='a'?T++:F++; }
    else if(q.dim==='JP'){ ans==='a'?J++:P++; }
  });
  return {E,I,S,N,T,F,J,P};
}

function getMBTI(s) {
  return (s.E>=s.I?'E':'I')+(s.S>=s.N?'S':'N')+(s.T>=s.F?'T':'F')+(s.J>=s.P?'J':'P');
}

function pct(a,b){ const t=a+b; return t===0?50:Math.round(a/t*100); }

function renderQuestion() {
  updateProgress();
  const q = questions[current];
  const hasAns = answers[current] !== undefined;
  document.getElementById('app').innerHTML = `
    <div class="q-card">
      <div class="q-dim">${dimLabel[q.dim]}</div>
      <div class="q-text">${q.text}</div>
      <div class="options">
        <button class="opt-btn${answers[current]==='a'?' selected':''}" onclick="selectAns('a')">${q.a}</button>
        <button class="opt-btn${answers[current]==='b'?' selected':''}" onclick="selectAns('b')">${q.b}</button>
      </div>
    </div>
    <div class="nav-btns">
      ${current > 0 ? '<button class="btn-prev" onclick="goPrev()">← 이전</button>' : ''}
      <button class="btn-next" onclick="goNext()" ${!hasAns ? 'disabled' : ''}>
        ${current === questions.length - 1 ? '결과 보러 가기 →' : '다음 →'}
      </button>
    </div>
  `;
}

function renderResult() {
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('progress-count').textContent = questions.length + ' / ' + questions.length;
  document.getElementById('header').style.display = 'none';

  const s = getScores();
  const type = getMBTI(s);
  const info = mbtiInfo[type];
  const ep = pct(s.E,s.I), sp = pct(s.S,s.N), tp = pct(s.T,s.F), jp = pct(s.J,s.P);

  const traits = [
    { label: type[0]==='E' ? '외향 (E)' : '내향 (I)', p: type[0]==='E'?ep:100-ep, dim:'EI' },
    { label: type[1]==='S' ? '감각 (S)' : '직관 (N)', p: type[1]==='S'?sp:100-sp, dim:'SN' },
    { label: type[2]==='T' ? '사고 (T)' : '감정 (F)', p: type[2]==='T'?tp:100-tp, dim:'TF' },
    { label: type[3]==='J' ? '판단 (J)' : '인식 (P)', p: type[3]==='J'?jp:100-jp, dim:'JP' },
  ];

  document.getElementById('app').innerHTML = `
    <div class="result-wrap">
      <div class="result-hero">
        <div class="result-type">${type}</div>
        <div class="result-name">${info.name}</div>
        <div class="result-desc">${info.desc}</div>
      </div>
      <div class="result-traits">
        <div class="section-label">// 성향 분석</div>
        ${traits.map(t => `
          <div class="trait-row">
            <div class="trait-label">${t.label}</div>
            <div class="trait-bar-wrap">
              <div class="trait-bar" data-width="${t.p}" style="background:${traitColors[t.dim]}"></div>
            </div>
            <div class="trait-pct">${t.p}%</div>
          </div>
        `).join('')}
      </div>
      <div class="result-strengths">
        <div class="section-label">// 주요 강점</div>
        <div class="strengths-grid">
          ${info.strengths.map(s => `<div class="strength-item">${s}</div>`).join('')}
        </div>
      </div>
      <button class="btn-restart" onclick="restartTest()">↺ 다시 테스트하기</button>
    </div>
  `;

  requestAnimationFrame(() => {
    document.querySelectorAll('.trait-bar').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  });
}

window.selectAns = function(v) {
  answers[current] = v;
  renderQuestion();
};
window.goNext = function() {
  if(answers[current]===undefined) return;
  if(current===questions.length-1){ renderResult(); return; }
  current++;
  renderQuestion();
};
window.goPrev = function() {
  if(current>0){ current--; renderQuestion(); }
};
window.restartTest = function() {
  current=0; answers={};
  document.getElementById('header').style.display = '';
  renderQuestion();
};

renderQuestion();
</script>
</body>
</html>
